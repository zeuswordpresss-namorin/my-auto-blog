name: 자동 발행 및 오디오 플레이어 결합 파이프라인

on:
  # 매일 정해진 시간에 자동으로 실행되거나(원하는 경우 주석 해제)
  # schedule:
  #   - cron: '0 0 * * *'
  # 필요할 때 사용자가 수동으로 버튼을 눌러 실행 가능
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # [1단계] 콘텐츠 자동 발행 및 포스트 HTML 파일 생성
  generate_post:
    runs-on: ubuntu-latest
    outputs:
      status: ${{ jobs.generate_post.status }}
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 포스트 자동 생성 스크립트 실행
        run: |
          if [ -f "generate_post.py" ]; then
            python generate_post.py
          else
            echo "generate_post.py 가 존재하지 않아 다음 단계로 이동합니다."
          fi

      # 새로 생성된 포스트 파일을 파이프라인 내부 아티팩트로 임시 보관
      - name: 포스트 아티팩트 보관
        uses: actions/upload-artifact@v4
        with:
          name: raw-post-html
          path: docs/

  # [2단계] 생성된 포스트를 바탕으로 오디오 리딩 파일 생성 및 플레이어 삽입 (업로드 전 필수 실행)
  build_audio_player:
    runs-on: ubuntu-latest
    needs: generate_post  # 1단계가 무조건 성공적으로 끝나야만 실행됨
    steps:
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      - name: 1단계에서 생성된 포스트 가져오기
        uses: actions/download-artifact@v4
        with:
          name: raw-post-html
          path: docs/

      - name: 파이썬 환경 설정 및 의존성 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 오픈소스 TTS 엔진 설치
        run: |
          python -m pip install --upgrade pip
          pip install edge-tts

      - name: 오디오 파일 합성 및 배지 옆 플레이어 주입 코드 실행
        run: |
          python run_pipeline.py

      # 생성된 오디오(.mp3)와 결합된 html을 저장소(Repository)에 강제 커밋/푸시
      - name: 변경사항 저장소에 커밋 및 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add docs/
          git diff-index --quiet HEAD || git commit -m "시스템: 자동 발행 포스트 오디오 컴포넌트 결합 완료"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # [3단계] 모든 자산(HTML, MP3) 결합 완료 후 최종 페이지 배포 및 업로드
  deploy_pages:
    runs-on: ubuntu-latest
    needs: build_audio_player  # 오디오 생성 및 코드 주입이 완벽히 끝난 후 배포 시작
    steps:
      - name: 소스코드 체크아웃 (최신 커밋 기준)
        uses: actions/checkout@v4
        with:
          ref: main

      # GitHub Pages 배포 플러그인 구동
      - name: GitHub Pages 업로드 준비
        uses: actions/configure-pages@v4

      - name: 배포 자산 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs/'

      - name: GitHub Pages로 최종 배포 확정
        id: deployment
        uses: actions/deploy-pages@v4

