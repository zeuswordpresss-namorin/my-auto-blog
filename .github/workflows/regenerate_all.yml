name: 전체 글 최신화 (재생성)

# 이미 발행된 모든 글을 최신 템플릿(번역아이콘, 이전/최신글 네비, 반응형 CSS,
# 픽셀단위로 안 넘치는 썸네일 등)으로 다시 감싸줍니다.
# AI를 다시 호출하지 않아 비용이 들지 않고, 글 내용은 그대로 유지됩니다.
#
# 자동으로는 실행되지 않고, 필요할 때 수동으로만 실행합니다.
# (템플릿을 크게 업그레이드한 직후에 한 번씩 돌려주면 됩니다)

on:
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 무료 한글 폰트 다운로드 (나눔고딕)
        run: |
          curl -fsSL -o font.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/nanumgothic/NanumGothic-Bold.ttf" \
            --max-time 30 || echo "폰트 다운로드 실패, 기본 폰트로 대체됩니다 (한글이 깨져 보일 수 있음)"

      - name: 필요 패키지 설치
        run: pip install requests pillow

      - name: 전체 글 재생성
        env:
          SITE_TITLE: ${{ vars.SITE_TITLE }}
          SITE_TAGLINE: ${{ vars.SITE_TAGLINE }}
          SITE_URL: ${{ vars.SITE_URL }}
          GA_MEASUREMENT_ID: ${{ vars.GA_MEASUREMENT_ID }}
          ADSENSE_CLIENT_ID: ${{ vars.ADSENSE_CLIENT_ID }}
          ADSENSE_SLOT_ID: ${{ vars.ADSENSE_SLOT_ID }}
          GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION }}
          ENABLE_AUTO_TRANSLATE: ${{ vars.ENABLE_AUTO_TRANSLATE }}
          ENABLE_TTS: ${{ vars.ENABLE_TTS }}
        run: python regenerate_all_posts.py

      - name: 변경사항 커밋 및 push
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "auto-blog-bot@users.noreply.github.com"
          git add docs
          git diff --cached --quiet && echo "변경사항 없음, 커밋 생략" || git commit -m "전체 글 최신 템플릿으로 재생성 ($(date +'%Y-%m-%d %H:%M'))"
          git push
