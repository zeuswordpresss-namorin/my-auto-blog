name: Auto Refresh Keywords

on:
  schedule:
    # 매일 자정(UTC)에 자동으로 실행되도록 설정
    - cron: '0 0 * * *'
  workflow_dispatch: # 수동 실행 버튼 활성화

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Keyword Script
      run: python refresh_keywords.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add keywords_queue.json
        # 변경 사항이 있을 때만 커밋 및 푸시 진행 (에러 방지)
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update keywords_queue.json" && git push)
