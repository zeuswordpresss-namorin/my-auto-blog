name: 주간 키워드 자동 보충 (구글 트렌드 1~7위)

# 매주 월요일 아침에 구글 트렌드(대한민국) 상위 7개를 keywords_queue.json에 자동으로 채워 넣습니다.
on:
  workflow_dispatch: {}   # 수동 실행 가능 (Actions 탭 > Run workflow)
  schedule:
    - cron: "0 22 * * 0"  # 매주 일요일 UTC 22:00 = 한국시간 매주 월요일 오전 7시

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 필요 패키지 설치
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 구글 트렌드 상위 7개 키워드 수집 및 큐 보충
        run: python refresh_keywords.py

      - name: 변경사항 커밋 및 Push
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "auto-blog-bot@users.noreply.github.com"
          git add keywords_queue.json
          git diff --cached --quiet && echo "변경사항이 없어 커밋을 생략합니다." || git commit -m "bot: 주간 키워드 자동 보충 ($(date +'%Y-%m-%d'))"
          git push
