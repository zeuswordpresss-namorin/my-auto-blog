name: 주간 키워드 자동 보충 및 스코어링 시스템

on:
  workflow_dispatch: {}   # GitHub Actions 탭에서 수동으로 즉시 실행 가능
  schedule:
    - cron: "0 22 * * 0"  # 매주 일요일 UTC 22:00 = 한국 시간 매주 월요일 오전 7시

permissions:
  contents: write         # 갱신된 JSON 파일을 저장소에 push하기 위한 권한

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # Error 방지를 위해 캐싱 옵션을 제거했습니다. 
          # 대안으로 아래 step에서 직접 requirements.txt의 존재 유무를 파악하여 설치합니다.

      - name: 필요 패키지 설치
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "[⚠️ 경고] requirements.txt 파일을 찾을 수 없습니다. 기본 패키지를 수동 설치합니다."
            pip install requests beautifulsoup4 lxml
          fi

      - name: 키워드 수집 및 종합 스코어링 실행
        run: python refresh_keywords.py
        env:
          PYTHONIOENCODING: "utf-8" # UTF-8 완전 지원을 위한 환경변수 설정

      - name: 변경사항 커밋 및 Push
        run: |
          git config user.name "auto-blog-bot"
          git config user.email "auto-blog-bot@users.noreply.github.com"
          
          # 파일이 없거나 예외로 인해 비어있을 경우를 대비해 큐 파일 상태 확인
          git add keywords_queue.json
          
          # 변경 사항이 존재할 때만 커밋을 수행하여 에러 방지
          if git diff --cached --quiet; then
            echo "변경사항이 없으므로 커밋을 생략합니다."
          else
            git commit -m "🤖 자동화: 주간 최적화 키워드 큐 갱신 ($(date +'%Y-%m-%d'))"
            git push
          fi
