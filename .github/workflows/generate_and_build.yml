name: Generate Post and Build Audio Player Pipeline

on:
  schedule:
    - cron: '0 9 * * *' # 매일 오전 9시에 자동 생성 및 빌드 실행
  workflow_dispatch: # 스마트폰 GitHub 앱/웹 UI에서 원터치로 직접 수동 가동 가능

# [핵심 수정 사항] GitHub Actions 봇에게 저장소 쓰기 권한을 명시적으로 부여합니다.
permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: 소스코드 체크아웃
      uses: actions/checkout@v4

    - name: 파이썬 환경 설정 (3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts

    - name: 1단계 - 기존 generate_post.py 실행 및 2단계 - 아나운서 TTS 및 플레이어 빌드 통합 실행
      run: python run_pipeline.py

    - name: 3단계 - 빌드 완료된 파일(docs/) 자동 커밋 및 저장소 푸시
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add docs/
        git diff --quiet && git diff --staged --quiet || (git commit -m "generate 실행에 의한 아나운서 오디오 및 모바일 플레이어 페이지 자동 빌드 완료" && git push)
