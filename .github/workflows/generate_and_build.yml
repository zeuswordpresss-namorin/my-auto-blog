name: Generate Post and Build Audio Player Pipeline

on:
  schedule:
    - cron: '0 9 * * *' # 매일 오전 9시에 자동 실행
  workflow_dispatch: # 스마트폰 화면에서 'Run workflow' 버튼으로 언제든 수동 가동 가능

# [추론 및 핵심 수정 사항] 
# 깃허브 페이지 배포(Pages Deployment) 시스템과 완벽하게 연동되도록 권한을 확장합니다.
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
    - name: 소스코드 체크아웃
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 히스토리를 명확히 체크하여 커밋 충돌을 방지합니다.

    - name: 파이썬 환경 설정 (3.10)
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 필수 라이브러리 의존성 설치
      run: |
        python -m pip install --upgrade pip
        pip install edge-tts

    - name: 1단계 및 2단계 - 통합 파이프라인 스크립트 실행
      run: python run_pipeline.py

    - name: 3단계 - 빌드 완료된 파일(docs/) 자동 커밋 및 저장소 푸시
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # docs 폴더 내의 변경사항(MP3 및 HTML)을 강제로 스테이징합니다.
        git add docs/
        
        # 변경 사항이 있을 때만 커밋하고 푸시하여 워크플로우 중단을 예방합니다.
        if ! git diff --cached --quiet; then
          git commit -m "자동 빌드 프로세스: 오디오 플레이어 및 포스트 갱신 완료"
          git push origin main
        else
          print "변경되거나 새로 생성된 파일이 없어 푸시를 건너뜁니다."
        fi

